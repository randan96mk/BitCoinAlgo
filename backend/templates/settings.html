{% extends "base.html" %}
{% set active = "settings" %}
{% block title %}Settings - BTC Trading Alerts{% endblock %}
{% block content %}
<div class="space-y-3 max-w-4xl mx-auto">
    <h1 class="text-lg font-bold">Configuration</h1>

    <form id="settings-form" class="space-y-3">
        <div class="bg-surface rounded-lg p-4 border border-border">
            <h2 class="text-sm font-semibold mb-3">Telegram</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs">
                <div>
                    <label class="block text-muted mb-1">Bot Token</label>
                    <input type="text" id="telegram.bot_token" class="w-full bg-card border border-border rounded px-2.5 py-2" placeholder="123456:ABC-DEF...">
                </div>
                <div>
                    <label class="block text-muted mb-1">Chat ID</label>
                    <input type="text" id="telegram.chat_id" class="w-full bg-card border border-border rounded px-2.5 py-2" placeholder="-1001234567890">
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="telegram.enabled" class="rounded bg-card border-border">
                    <label class="text-muted">Enable Telegram Alerts</label>
                </div>
            </div>
        </div>

        <div class="bg-surface rounded-lg p-4 border border-border">
            <h2 class="text-sm font-semibold mb-3">Exchange</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-xs">
                <div>
                    <label class="block text-muted mb-1">Exchange</label>
                    <select id="exchange.name" class="w-full bg-card border border-border rounded px-2.5 py-2">
                        <option value="binance">Binance</option><option value="bybit">Bybit</option>
                    </select>
                </div>
                <div>
                    <label class="block text-muted mb-1">Symbol</label>
                    <input type="text" id="exchange.symbol" class="w-full bg-card border border-border rounded px-2.5 py-2" value="BTC/USDT">
                </div>
                <div>
                    <label class="block text-muted mb-1">Timeframe</label>
                    <select id="strategy.timeframe" class="w-full bg-card border border-border rounded px-2.5 py-2">
                        <option value="1m">1m</option><option value="3m">3m</option><option value="5m">5m</option>
                        <option value="15m">15m</option><option value="30m">30m</option><option value="1h">1h</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-surface rounded-lg p-4 border border-border">
            <h2 class="text-sm font-semibold mb-3">Risk Management</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-xs">
                <div>
                    <label class="block text-muted mb-1">Position Size (USDT)</label>
                    <input type="number" id="risk.position_size" class="w-full bg-card border border-border rounded px-2.5 py-2" value="100">
                </div>
                <div>
                    <label class="block text-muted mb-1">SL ATR Multiplier</label>
                    <input type="number" step="0.1" id="strategy.sl_atr_mult" class="w-full bg-card border border-border rounded px-2.5 py-2" value="1.5">
                </div>
                <div>
                    <label class="block text-muted mb-1">Risk %</label>
                    <input type="number" step="0.1" id="risk.risk_pct" class="w-full bg-card border border-border rounded px-2.5 py-2" value="1.0">
                </div>
            </div>
        </div>

        <div class="bg-surface rounded-lg p-4 border border-border">
            <h2 class="text-sm font-semibold mb-3">Strategy Parameters</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs">
                <div><label class="block text-muted mb-1">RSI Length</label><input type="number" id="strategy.rsi_length" class="w-full bg-card border border-border rounded px-2.5 py-2" value="14"></div>
                <div><label class="block text-muted mb-1">Trend MA Length</label><input type="number" id="strategy.trend_ma_length" class="w-full bg-card border border-border rounded px-2.5 py-2" value="50"></div>
                <div><label class="block text-muted mb-1">Bull Range Low</label><input type="number" id="strategy.bull_range_low" class="w-full bg-card border border-border rounded px-2.5 py-2" value="40"></div>
                <div><label class="block text-muted mb-1">Bull Range High</label><input type="number" id="strategy.bull_range_high" class="w-full bg-card border border-border rounded px-2.5 py-2" value="80"></div>
                <div><label class="block text-muted mb-1">Bear Range Low</label><input type="number" id="strategy.bear_range_low" class="w-full bg-card border border-border rounded px-2.5 py-2" value="20"></div>
                <div><label class="block text-muted mb-1">Bear Range High</label><input type="number" id="strategy.bear_range_high" class="w-full bg-card border border-border rounded px-2.5 py-2" value="60"></div>
                <div><label class="block text-muted mb-1">Confirm Bars</label><input type="number" id="strategy.confirm_bars" class="w-full bg-card border border-border rounded px-2.5 py-2" value="2"></div>
                <div><label class="block text-muted mb-1">ADX Min</label><input type="number" id="strategy.adx_min_strength" class="w-full bg-card border border-border rounded px-2.5 py-2" value="20"></div>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 rounded text-xs font-semibold transition">Save Configuration</button>
            <span id="save-status" class="text-xs text-profit hidden">Saved!</span>
        </div>
    </form>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadConfig() {
    const config = await fetchJSON('/api/config');
    if (!config) return;
    function setVal(path, val) {
        const el = document.getElementById(path);
        if (!el) return;
        if (el.type === 'checkbox') el.checked = val;
        else el.value = val;
    }
    function walk(obj, prefix='') {
        for (const [k, v] of Object.entries(obj)) {
            const path = prefix ? prefix + '.' + k : k;
            if (typeof v === 'object' && v !== null) walk(v, path);
            else setVal(path, v);
        }
    }
    walk(config);
}
document.getElementById('settings-form').onsubmit = async (e) => {
    e.preventDefault();
    const inputs = e.target.querySelectorAll('input, select');
    const data = {};
    inputs.forEach(el => {
        if (!el.id) return;
        data[el.id] = el.type === 'checkbox' ? el.checked : el.type === 'number' ? Number(el.value) : el.value;
    });
    await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    const s = document.getElementById('save-status');
    s.classList.remove('hidden');
    setTimeout(() => s.classList.add('hidden'), 3000);
};
loadConfig();
</script>
{% endblock %}
