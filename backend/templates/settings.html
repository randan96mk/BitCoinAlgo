{% extends "base.html" %}
{% set active = "settings" %}
{% block title %}Settings - BTC Trading Alerts{% endblock %}
{% block content %}
<div class="space-y-6">
    <h1 class="text-2xl font-bold">Configuration</h1>

    <form id="settings-form" class="space-y-6">
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h2 class="text-lg font-semibold mb-4">Telegram</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Bot Token</label>
                    <input type="text" id="telegram.bot_token" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" placeholder="123456:ABC-DEF...">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Chat ID</label>
                    <input type="text" id="telegram.chat_id" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" placeholder="-1001234567890">
                </div>
                <div class="flex items-center space-x-2">
                    <input type="checkbox" id="telegram.enabled" class="rounded">
                    <label class="text-sm text-gray-400">Enable Telegram Alerts</label>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h2 class="text-lg font-semibold mb-4">Exchange</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Exchange</label>
                    <select id="exchange.name" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm">
                        <option value="binance">Binance</option>
                        <option value="bybit">Bybit</option>
                        <option value="coinbase">Coinbase</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Symbol</label>
                    <input type="text" id="exchange.symbol" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" value="BTC/USDT">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Timeframe</label>
                    <select id="strategy.timeframe" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm">
                        <option value="1m">1m</option>
                        <option value="3m">3m</option>
                        <option value="5m">5m</option>
                        <option value="15m">15m</option>
                        <option value="30m">30m</option>
                        <option value="1h">1h</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h2 class="text-lg font-semibold mb-4">Risk Management</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Position Size (USDT)</label>
                    <input type="number" id="risk.position_size" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" value="100">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">SL ATR Multiplier</label>
                    <input type="number" step="0.1" id="strategy.sl_atr_mult" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" value="1.5">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Risk %</label>
                    <input type="number" step="0.1" id="risk.risk_pct" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" value="1.0">
                </div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h2 class="text-lg font-semibold mb-4">Strategy Parameters</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">RSI Length</label>
                    <input type="number" id="strategy.rsi_length" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" value="14">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Trend MA Length</label>
                    <input type="number" id="strategy.trend_ma_length" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" value="50">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Bull Range Low</label>
                    <input type="number" id="strategy.bull_range_low" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" value="40">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Bull Range High</label>
                    <input type="number" id="strategy.bull_range_high" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" value="80">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Bear Range Low</label>
                    <input type="number" id="strategy.bear_range_low" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" value="20">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Bear Range High</label>
                    <input type="number" id="strategy.bear_range_high" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" value="60">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Confirm Bars</label>
                    <input type="number" id="strategy.confirm_bars" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" value="2">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">ADX Min</label>
                    <input type="number" id="strategy.adx_min_strength" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm" value="20">
                </div>
            </div>
        </div>

        <button type="submit" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 rounded font-semibold text-sm">
            Save Configuration
        </button>
        <span id="save-status" class="ml-4 text-sm text-green-400 hidden">Saved!</span>
    </form>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadConfig() {
    const config = await fetchJSON('/api/config');
    function setVal(path, val) {
        const el = document.getElementById(path);
        if (!el) return;
        if (el.type === 'checkbox') el.checked = val;
        else el.value = val;
    }
    function walk(obj, prefix='') {
        for (const [k, v] of Object.entries(obj)) {
            const path = prefix ? prefix + '.' + k : k;
            if (typeof v === 'object' && v !== null) walk(v, path);
            else setVal(path, v);
        }
    }
    walk(config);
}

document.getElementById('settings-form').onsubmit = async (e) => {
    e.preventDefault();
    const inputs = e.target.querySelectorAll('input, select');
    const data = {};
    inputs.forEach(el => {
        if (!el.id) return;
        let val = el.type === 'checkbox' ? el.checked : el.type === 'number' ? Number(el.value) : el.value;
        data[el.id] = val;
    });
    await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    document.getElementById('save-status').classList.remove('hidden');
    setTimeout(() => document.getElementById('save-status').classList.add('hidden'), 3000);
};

loadConfig();
</script>
{% endblock %}
