<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BTC Trading Alerts{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        panel: '#111827',
                        surface: '#1a2332',
                        card: '#1e293b',
                        border: '#2d3a4a',
                        muted: '#64748b',
                        profit: '#22c55e',
                        loss: '#ef4444',
                        buy: '#3b82f6',
                        sell: '#f97316',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; background: #0b1121; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        .glow-green { box-shadow: 0 0 12px rgba(34,197,94,0.15); }
        .glow-red { box-shadow: 0 0 12px rgba(239,68,68,0.15); }
        .glow-blue { box-shadow: 0 0 12px rgba(59,130,246,0.15); }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
        /* Toast alerts */
        #toast-container { position:fixed; top:60px; right:16px; z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast { pointer-events:auto; min-width:280px; max-width:360px; padding:12px 16px; border-radius:8px; border:1px solid; backdrop-filter:blur(12px); animation: toastIn 0.4s ease-out, toastOut 0.5s ease-in forwards; animation-delay: 0s, var(--toast-duration, 4.5s); }
        .toast-buy { background:rgba(34,197,94,0.12); border-color:rgba(34,197,94,0.4); box-shadow:0 4px 24px rgba(34,197,94,0.2); }
        .toast-sell { background:rgba(239,68,68,0.12); border-color:rgba(239,68,68,0.4); box-shadow:0 4px 24px rgba(239,68,68,0.2); }
        .toast-exit { background:rgba(59,130,246,0.12); border-color:rgba(59,130,246,0.4); box-shadow:0 4px 24px rgba(59,130,246,0.2); }
        .toast-progress { position:absolute; bottom:0; left:0; height:2px; border-radius:0 0 8px 8px; animation: toastProgress linear forwards; animation-duration: var(--toast-duration, 5s); }
        .toast-buy .toast-progress { background:#22c55e; }
        .toast-sell .toast-progress { background:#ef4444; }
        .toast-exit .toast-progress { background:#3b82f6; }
        @keyframes toastIn { from{opacity:0;transform:translateX(100%)} to{opacity:1;transform:translateX(0)} }
        @keyframes toastOut { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(100%)} }
        @keyframes toastProgress { from{width:100%} to{width:0%} }
        .pulse-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
        .pulse-dot.live { background:#22c55e; animation: pulse 1.5s infinite; }
        .pulse-dot.off { background:#ef4444; }
        @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,0.4)} 50%{opacity:0.8;box-shadow:0 0 0 6px rgba(34,197,94,0)} }
    </style>
</head>
<body class="text-gray-100 min-h-screen overflow-x-hidden">
    <!-- Top bar -->
    <nav class="bg-surface border-b border-border px-4 py-2">
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-xl font-bold text-blue-400">&#8383;</span>
                <span class="text-sm font-bold tracking-wide uppercase text-gray-300">BTC Trading Alerts</span>
                <span class="pulse-dot live" id="status-dot"></span>
                <span id="engine-status-text" class="text-xs text-muted">connecting...</span>
            </div>
            <div class="flex items-center space-x-1 text-xs">
                <a href="/" class="px-3 py-1.5 rounded hover:bg-card transition {% if active == 'dashboard' %}bg-card text-blue-400{% else %}text-gray-400{% endif %}">Terminal</a>
                <a href="/signals" class="px-3 py-1.5 rounded hover:bg-card transition {% if active == 'signals' %}bg-card text-blue-400{% else %}text-gray-400{% endif %}">History</a>
                <a href="/analytics" class="px-3 py-1.5 rounded hover:bg-card transition {% if active == 'analytics' %}bg-card text-blue-400{% else %}text-gray-400{% endif %}">Analytics</a>
                <a href="/settings" class="px-3 py-1.5 rounded hover:bg-card transition {% if active == 'settings' %}bg-card text-blue-400{% else %}text-gray-400{% endif %}">Settings</a>
            </div>
        </div>
    </nav>
    <main class="{% block main_class %}p-3{% endblock %}">
        {% block content %}{% endblock %}
    </main>
    <div id="toast-container"></div>
    <script>
        async function fetchJSON(url) {
            try { const r = await fetch(url); return r.json(); }
            catch(e) { console.error(e); return null; }
        }
        // ── Alert Sound System (Web Audio API) ──
        const AlertSound = {
            ctx: null,
            getCtx() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); return this.ctx; },
            play(type) {
                try {
                    const ctx = this.getCtx();
                    if (ctx.state === 'suspended') ctx.resume();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    if (type === 'buy') {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(600, ctx.currentTime);
                        osc.frequency.linearRampToValueAtTime(900, ctx.currentTime + 0.1);
                        osc.frequency.setValueAtTime(900, ctx.currentTime + 0.15);
                        osc.frequency.linearRampToValueAtTime(1200, ctx.currentTime + 0.25);
                        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.35);
                        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.35);
                    } else if (type === 'sell') {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(900, ctx.currentTime);
                        osc.frequency.linearRampToValueAtTime(500, ctx.currentTime + 0.15);
                        osc.frequency.setValueAtTime(500, ctx.currentTime + 0.2);
                        osc.frequency.linearRampToValueAtTime(300, ctx.currentTime + 0.35);
                        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.4);
                        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
                    } else {
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(700, ctx.currentTime);
                        osc.frequency.linearRampToValueAtTime(500, ctx.currentTime + 0.2);
                        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
                    }
                } catch(e) { console.warn('Audio alert failed:', e); }
            }
        };
        function showToast(type, title, details, duration) {
            duration = duration || 5000;
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const cls = type === 'buy' ? 'toast-buy' : type === 'sell' ? 'toast-sell' : 'toast-exit';
            const icon = type === 'buy' ? '&#9650;' : type === 'sell' ? '&#9660;' : '&#9654;';
            const iconColor = type === 'buy' ? 'text-profit' : type === 'sell' ? 'text-loss' : 'text-blue-400';
            toast.className = `toast ${cls}`;
            toast.style.setProperty('--toast-duration', (duration/1000) + 's');
            toast.innerHTML = `
                <div class="flex items-start gap-3">
                    <span class="text-xl ${iconColor} mt-0.5">${icon}</span>
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold text-sm">${title}</div>
                        <div class="text-xs text-gray-400 mt-0.5 font-mono">${details}</div>
                    </div>
                    <button onclick="this.closest('.toast').remove()" class="text-gray-500 hover:text-gray-300 text-lg leading-none">&times;</button>
                </div>
                <div class="toast-progress"></div>
            `;
            container.appendChild(toast);
            AlertSound.play(type);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, duration + 600);
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
