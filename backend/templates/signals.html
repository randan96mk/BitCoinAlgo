{% extends "base.html" %}
{% set active = "signals" %}
{% block title %}Signal History - BTC Trading Alerts{% endblock %}
{% block content %}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold">Signal History</h1>
        <div class="flex space-x-2">
            <select id="filter-dir" class="bg-gray-800 border border-gray-600 rounded px-3 py-1 text-sm">
                <option value="">All Directions</option>
                <option value="long">Long</option>
                <option value="short">Short</option>
            </select>
            <select id="filter-status" class="bg-gray-800 border border-gray-600 rounded px-3 py-1 text-sm">
                <option value="">All Status</option>
                <option value="true">Closed</option>
                <option value="false">Open</option>
            </select>
        </div>
    </div>

    <div class="bg-gray-800 rounded-lg border border-gray-700 overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="text-gray-400 border-b border-gray-700 bg-gray-750">
                <tr>
                    <th class="text-left px-4 py-3">Date</th>
                    <th class="text-left px-4 py-3">Dir</th>
                    <th class="text-right px-4 py-3">Entry</th>
                    <th class="text-right px-4 py-3">Exit</th>
                    <th class="text-right px-4 py-3">SL</th>
                    <th class="text-right px-4 py-3">TP1</th>
                    <th class="text-right px-4 py-3">TP3</th>
                    <th class="text-right px-4 py-3">PnL</th>
                    <th class="text-center px-4 py-3">W/L</th>
                    <th class="text-right px-4 py-3">Duration</th>
                    <th class="text-left px-4 py-3">Reason</th>
                </tr>
            </thead>
            <tbody id="history-body" class="divide-y divide-gray-700"></tbody>
        </table>
    </div>
    <div class="flex justify-between items-center">
        <span id="total-count" class="text-sm text-gray-400"></span>
        <div class="space-x-2">
            <button id="prev-btn" class="px-3 py-1 bg-gray-700 rounded text-sm disabled:opacity-50">Prev</button>
            <button id="next-btn" class="px-3 py-1 bg-gray-700 rounded text-sm disabled:opacity-50">Next</button>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let offset = 0;
const limit = 25;

async function loadSignals() {
    const dir = document.getElementById('filter-dir').value;
    const status = document.getElementById('filter-status').value;
    let url = `/api/signals?limit=${limit}&offset=${offset}`;
    if (dir) url += `&direction=${dir}`;
    if (status) url += `&is_closed=${status}`;

    const data = await fetchJSON(url);
    document.getElementById('total-count').textContent = `${data.total} signals total`;
    document.getElementById('prev-btn').disabled = offset === 0;
    document.getElementById('next-btn').disabled = offset + limit >= data.total;

    document.getElementById('history-body').innerHTML = data.signals.map(s => `
        <tr class="hover:bg-gray-750">
            <td class="px-4 py-2">${s.timestamp ? new Date(s.timestamp).toLocaleString() : '--'}</td>
            <td class="px-4 py-2">
                <span class="px-2 py-1 rounded text-xs font-bold
                    ${s.direction === 'long' ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'}">
                    ${s.direction?.toUpperCase()}
                </span>
            </td>
            <td class="px-4 py-2 text-right">${s.entry_price?.toFixed(2) || '--'}</td>
            <td class="px-4 py-2 text-right">${s.exit_price?.toFixed(2) || '--'}</td>
            <td class="px-4 py-2 text-right">${s.stop_loss?.toFixed(2) || '--'}</td>
            <td class="px-4 py-2 text-right">${s.tp1?.toFixed(2) || '--'}</td>
            <td class="px-4 py-2 text-right">${s.tp3?.toFixed(2) || '--'}</td>
            <td class="px-4 py-2 text-right ${s.pnl > 0 ? 'text-green-400' : s.pnl < 0 ? 'text-red-400' : ''}">
                ${s.pnl != null ? s.pnl.toFixed(2) : '--'}
            </td>
            <td class="px-4 py-2 text-center">
                ${s.is_closed ? (s.is_winner ? '<span class="text-green-400">W</span>' : '<span class="text-red-400">L</span>') : '<span class="text-yellow-400">Open</span>'}
            </td>
            <td class="px-4 py-2 text-right">${s.duration_min ? s.duration_min + 'm' : '--'}</td>
            <td class="px-4 py-2">${s.exit_reason || '--'}</td>
        </tr>
    `).join('');
}

document.getElementById('filter-dir').onchange = () => { offset = 0; loadSignals(); };
document.getElementById('filter-status').onchange = () => { offset = 0; loadSignals(); };
document.getElementById('prev-btn').onclick = () => { offset = Math.max(0, offset - limit); loadSignals(); };
document.getElementById('next-btn').onclick = () => { offset += limit; loadSignals(); };
loadSignals();
</script>
{% endblock %}
